name: CD Demo (Reusable CI & CD)

on:
  workflow_dispatch:

jobs:
  ci:
    uses: .github/workflows/reusable-ci.yml@v1

  cd:
    needs: ci
    uses: .github/workflows/reusable-cd.yml@v1
    with:
      artifact_name: ${{ needs.ci.outputs.artifact_name }}
      environment: dev
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}