name: CD - Demo Application Deployment and Release

on:
  push:
    branches: [dev, stage, main]

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  deployments: write

env:
  PYTHON_VERSION: "3.11"
  MAX_RETRIES: 3
  BASE_DELAY_SECONDS: 10

jobs:
  deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    timeout-minutes: 40

    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build application artifact (retry-safe)
        working-directory: python-app
        shell: bash
        run: |
          pip install build
          for attempt in $(seq 1 $MAX_RETRIES); do
            if python -m build; then
              exit 0
            fi
            delay=$(( BASE_DELAY_SECONDS * attempt ))
            echo "Retrying build in ${delay}s..."
            sleep $delay
          done
          echo "Build failed after retries"
          exit 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy artifact to S3 (exponential backoff)
        shell: bash
        run: |
          for attempt in $(seq 1 $MAX_RETRIES); do
            if aws s3 sync python-app/dist/ \
              s3://${{ vars.S3_BUCKET_NAME }}/${{ github.ref_name }}/ --delete; then
              exit 0
            fi
            delay=$(( BASE_DELAY_SECONDS * 2 ** (attempt - 1) ))
            echo "Retrying deployment in ${delay}s..."
            sleep $delay
          done
          echo "Deployment failed after retries"
          exit 1

  prod-release-ledger:
    name: Production Release Ledger (SemVer Tag, Release, Manifest)
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: needs.deploy.result == 'success' && github.ref_name == 'main'

    permissions:
      contents: write
      actions: read

    environment:
      name: prod

    steps:
      - name: Checkout repository (full history for tag discovery)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Compute next SemVer tag (patch increment)
        id: semver
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --tags --force --prune
          PATTERN='v[0-9]*.[0-9]*.[0-9]*'
          LATEST="$(git tag -l "$PATTERN" --sort=-version:refname | head -n 1 || true)"

          if [[ -z "$LATEST" ]]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            PATCH=$((PATCH + 1))
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next release tag: $NEXT"

      - name: Determine rollback reference (previous production version)
        id: rollback
        shell: bash
        run: |
          set -Eeuo pipefail
          PREV="${{ steps.semver.outputs.latest }}"

          if [[ -z "$PREV" ]]; then
            echo "rollback_tag=NONE" >> "$GITHUB_OUTPUT"
            echo "rollback_sha=NONE" >> "$GITHUB_OUTPUT"
          else
            PREV_SHA="$(git rev-list -n 1 "$PREV")"
            echo "rollback_tag=$PREV" >> "$GITHUB_OUTPUT"
            echo "rollback_sha=$PREV_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release manifest
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p release_meta
          cat > release_meta/manifest.json <<EOF
          {
            "environment": "prod",
            "tag": "${{ steps.semver.outputs.tag }}",
            "commit_sha": "${GITHUB_SHA}",
            "rollback_tag": "${{ steps.rollback.outputs.rollback_tag }}",
            "rollback_commit_sha": "${{ steps.rollback.outputs.rollback_sha }}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "repository": "${GITHUB_REPOSITORY}",
            "actor": "${GITHUB_ACTOR}",
            "workflow": "${GITHUB_WORKFLOW}",
            "timestamp_utc": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Create and push annotated SemVer tag (idempotent)
        shell: bash
        run: |
          set -Eeuo pipefail
          TAG="${{ steps.semver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git tag -a "$TAG" -m "Production release $TAG from ${GITHUB_SHA}"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release and attach manifest (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -Eeuo pipefail
          TAG="${{ steps.semver.outputs.tag }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
          else
            gh release create "$TAG" \
              --title "Production Release $TAG" \
              --notes "Production release for $TAG" \
              --target "$GITHUB_SHA" \
              release_meta/manifest.json
          fi

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-meta-${{ steps.semver.outputs.tag }}
          path: release_meta/
          retention-days: 10
