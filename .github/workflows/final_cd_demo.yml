name: CD - Deploy on Merge

on:
  push:
    branches:
      - dev
      - stage
      - main

permissions:
  contents: write    # Required for prod tagging
  id-token: write    # Required for AWS OIDC

jobs:
  cd:
    name: CD - Build & Deploy
    runs-on: ubuntu-latest

    # Branch → Environment mapping
    environment: ${{ github.ref_name }}

    steps:
      # --------------------------------------------------
      # Checkout merged branch (trusted code)
      # --------------------------------------------------
      - name: Checkout branch code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------
      # Setup Python
      # --------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------
      # Restore dependency cache
      # --------------------------------------------------
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('python-app/requirements.txt') }}

      # --------------------------------------------------
      # Build application
      # --------------------------------------------------
      - name: Build application
        working-directory: python-app
        run: |
          pip install -r requirements.txt
          pip install build
          python -m build

      # --------------------------------------------------
      # AWS Authentication (OIDC)
      # --------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # --------------------------------------------------
      # Deploy artifacts
      # --------------------------------------------------
      - name: Deploy to S3
        run: |
          aws s3 sync python-app/dist/ \
            s3://${{ vars.S3_BUCKET_NAME }}/ \
            --delete

      # --------------------------------------------------
      #  CD ARTIFACT (what was deployed)
      # --------------------------------------------------
      - name: Upload deployed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployed-${{ github.ref_name }}-${{ github.sha }}
          path: python-app/dist
          retention-days: 30

      # --------------------------------------------------
      #  RELEASE TAGGING (PROD ONLY)
      # --------------------------------------------------
      - name: Create production release tag
        if: github.ref_name == 'main'
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          TAG_NAME="prod-${DATE}-${SHORT_SHA}"

          echo "Creating production tag: $TAG_NAME"
          git tag -a "$TAG_NAME" -m "Production release deployed"
          git push origin "$TAG_NAME"