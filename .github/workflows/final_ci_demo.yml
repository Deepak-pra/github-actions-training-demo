name: CI - Demo Application Validation

on:
  pull_request:
    branches: [dev, stage, main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  MAX_RETRIES: 3
  BASE_DELAY_SECONDS: 5

jobs:
  validate:
    name: CI - Quality and Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (retry with backoff)
        working-directory: python-app
        shell: bash
        run: |
          set -e
          for attempt in $(seq 1 $MAX_RETRIES); do
            if pip install -r requirements.txt; then
              exit 0
            fi
            delay=$(( BASE_DELAY_SECONDS * attempt ))
            echo "Retrying dependency installation in ${delay}s..."
            sleep $delay
          done
          echo "Dependency installation failed after retries"
          exit 1

      - name: Static code analysis (fail fast)
        working-directory: python-app
        run: |
          pip install flake8
          flake8 .

      - name: Dependency vulnerability scan (retry-safe)
        working-directory: python-app
        shell: bash
        run: |
          pip install pip-audit
          for attempt in $(seq 1 $MAX_RETRIES); do
            if pip-audit; then
              exit 0
            fi
            delay=$(( BASE_DELAY_SECONDS * attempt ))
            echo "Retrying vulnerability scan in ${delay}s..."
            sleep $delay
          done
          echo "Vulnerability scan failed after retries"
          exit 1

      - name: Unit tests (deterministic, no retry)
        working-directory: python-app
        run: |
          pip install pytest pytest-timeout
          pytest -v -x --timeout=300 --junitxml=test-results.xml

      - name: Upload unit test evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-results
          path: python-app/test-results.xml
          retention-days: 10
