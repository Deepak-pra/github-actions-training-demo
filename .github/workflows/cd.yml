name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Show context
        run: |
          echo "CI run id: ${{ github.event.workflow_run.id }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"

      - name: List CI artifacts
        id: list
        uses: actions/github-script@v7
        with:
          script: |
            const res = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            const names = res.data.artifacts.map(a => a.name);
            core.setOutput("names", names.join(","));
            console.log("Artifacts found:", names);

      - name: Download Node.js artifact
        if: contains(steps.list.outputs.names, 'node-app-build')
        uses: actions/download-artifact@v4
        with:
          name: node-app-build
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts/node

      - name: Download Python artifact
        if: contains(steps.list.outputs.names, 'python-app-build')
        uses: actions/download-artifact@v4
        with:
          name: python-app-build
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts/python

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Node.js
        if: contains(steps.list.outputs.names, 'node-app-build')
        run: |
          aws s3 sync artifacts/node/ s3://${{ vars.S3_BUCKET_NAME }}/node/ --delete

      - name: Deploy Python
        if: contains(steps.list.outputs.names, 'python-app-build')
        run: |
          aws s3 sync artifacts/python/ s3://${{ vars.S3_BUCKET_NAME }}/python/ --delete