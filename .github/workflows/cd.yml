name: CD Pipeline

on:
  workflow_run:
    workflows:
      - "CI Pipeline"
    types:
      - completed

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    environment: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Show deployment context
        run: |
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "Target bucket: ${{ vars.S3_BUCKET_NAME }}"

      # ------------------------------------
      # Download Node.js artifact (if exists)
      # ------------------------------------
      - name: Download Node.js artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app-build
          path: artifacts/node
          run-id: ${{ github.event.workflow_run.id }}
          if-no-files-found: ignore

      # ------------------------------------
      # Download Python artifact (if exists)
      # ------------------------------------
      - name: Download Python artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app-build
          path: artifacts/python
          run-id: ${{ github.event.workflow_run.id }}
          if-no-files-found: ignore

      # ------------------------------------
      # AWS OIDC credentials
      # ------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ------------------------------------
      # Deploy Node.js (only if built)
      # ------------------------------------
      - name: Deploy Node.js app
        if: ${{ hashFiles('artifacts/node/**') != '' }}
        run: |
          echo "Deploying Node.js app"
          aws s3 sync artifacts/node/ \
            s3://${{ vars.S3_BUCKET_NAME }}/node/ \
            --delete

      # ------------------------------------
      # Deploy Python (only if built)
      # ------------------------------------
      - name: Deploy Python app
        if: ${{ hashFiles('artifacts/python/**') != '' }}
        run: |
          echo "Deploying Python app"
          aws s3 sync artifacts/python/ \
            s3://${{ vars.S3_BUCKET_NAME }}/python/ \
            --delete
