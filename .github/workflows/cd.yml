name: CD Pipeline

on:
  push:
    branches: [ "dev", "stage", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download static site
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: dist

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Inject Metadata
        run: |
          echo "window.DEPLOY_ENV='${{ github.ref_name }}';" >> dist/metadata.js
          echo "window.COMMIT_SHA='${{ github.sha }}';" >> dist/metadata.js
          echo "window.BUILD_TIME='$(date --utc +%FT%TZ)';" >> dist/metadata.js

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }} --delete