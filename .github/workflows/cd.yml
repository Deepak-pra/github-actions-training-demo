name: CD Pipeline

on:
  workflow_run:
    workflows:
      - "CI Pipeline"
    types:
      - completed

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Show deployment context
        run: |
          echo "Triggered by CI run: ${{ github.event.workflow_run.id }}"
          echo "Commit SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Deploying Python application to DEV"

      - name: Download Python artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app-build
          run-id: ${{ github.event.workflow_run.id }}
          path: artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Python app to DEV S3
        run: |
          aws s3 sync artifact/ \
            s3://${{ vars.S3_BUCKET_NAME }}/python/ \
            --delete
