name: Custom Actions Demo (CI → CD)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # Required for AWS OIDC

jobs:
  ci:
    name: CI Job - Build Artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build via CI action
        uses: ./.github/actions/ci-build

      - uses: actions/upload-artifact@v4
        with:
          name: python-build
          path: python-app/dist

  cd:
    name: CD Job - Deploy Artifact
    needs: ci
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: python-build
          path: artifact-input

      - name: Deploy via CD action
        uses: ./.github/actions/cd-deploy
        with:
          aws_region: ${{ vars.AWS_REGION }}
          s3_bucket: ${{ vars.S3_BUCKET_NAME }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
