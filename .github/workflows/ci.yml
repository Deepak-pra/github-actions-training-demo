name: CI Pipeline

on:
  push:
    branches: ["dev", "stage", "main"]
  pull_request:
    branches: ["dev", "stage", "main"]
    types: [ opened, reopened]
  workflow_dispatch:   

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Lint (via npx, no local install, no repo dependencies)
      - name: Run linting
        run: npx eslint src --ext .js

      # Unit tests (Node built-in test runner)
      - name: Run unit tests
        run: node --test tests/*.js

      # Logical "build" step (static site = already buildable)
      - name: Prepare build output
        run: |
          rm -rf dist
          mkdir dist
          cp -r src/* dist/

      # Upload artifact for CD
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: dist/
          retention-days: 2

  cd:
    needs: ci
    # Deploy only if CI succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    # Map branch → environment
    environment: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Download artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: dist
          run-id: ${{ github.event.workflow_run.id }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Inject deployment metadata
        run: |
          echo "window.DEPLOY_ENV='${{ github.event.workflow_run.head_branch }}';" >> dist/metadata.js
          echo "window.COMMIT_SHA='${{ github.event.workflow_run.head_sha }}';" >> dist/metadata.js
          echo "window.BUILD_TIME='$(date -u +%FT%TZ)';" >> dist/metadata.js

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME }} --delete        