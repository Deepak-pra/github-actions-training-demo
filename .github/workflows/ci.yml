name: CI Pipeline (Node.js & Python - Path Based)

on:
  push:
    branches:
      - dev
      - stage
      - main
    paths:
      - node-app/**
      - python-app/**
      - .github/workflows/**
  pull_request:
    branches:
      - dev
      - stage
      - main
    paths:
      - node-app/**
      - python-app/**
      - .github/workflows/**

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest

    outputs:
      node_changed: ${{ steps.detect.outputs.node_changed }}
      python_changed: ${{ steps.detect.outputs.python_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        shell: bash
        run: |
          echo "Detecting changed files..."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          git diff --name-only "$BASE_SHA" "${{ github.sha }}" > files.txt || true
          cat files.txt

          NODE_CHANGED=false
          PYTHON_CHANGED=false

          if grep -q "^.github/workflows/" files.txt; then
            NODE_CHANGED=true
            PYTHON_CHANGED=true
          fi

          if grep -q "^node-app/" files.txt; then
            NODE_CHANGED=true
          fi

          if grep -q "^python-app/" files.txt; then
            PYTHON_CHANGED=true
          fi

          echo "node_changed=$NODE_CHANGED" >> $GITHUB_OUTPUT
          echo "python_changed=$PYTHON_CHANGED" >> $GITHUB_OUTPUT

  node-ci:
    name: Node.js CI
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.node_changed == 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: node-app
        run: npm install

      - name: Run lint
        working-directory: node-app
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: node-app
        run: npm test

      - name: Build application
        working-directory: node-app
        run: npm run build

      - name: Upload Node.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app-build
          path: node-app/dist
          retention-days: 3

  python-ci:
    name: Python CI
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.python_changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: python-app
        run: pip install -r requirements.txt

      - name: Run lint
        working-directory: python-app
        run: flake8 .

      - name: Run unit tests
        working-directory: python-app
        run: python -m unittest

      - name: Build Python package
        working-directory: python-app
        run: |
          pip install build
          python -m build

      - name: Upload Python build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app-build
          path: python-app/dist
          retention-days: 3