name: CI Pipeline

on:
  push:
    branches: [dev]
    paths:
      - python-app/**
      - .github/workflows/**
  pull_request:
    branches: [dev]
    paths:
      - python-app/**
      - .github/workflows/**

jobs:
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: python-app
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: python-app
        run: python -m unittest

      - name: Build Python package
        working-directory: python-app
        run: |
          pip install build
          python -m build

      # ✅ Upload artifact ONLY for push events (deployable)
      - name: Upload Python artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: python-app-build
          path: python-app/dist