name: CI Pipeline

on:
  push:
    branches: ["dev", "stage", "main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Lint (via npx, no local install, no repo dependencies)
      - name: Run linting
        run: npx eslint src --ext .js

      # Unit tests (Node built-in test runner)
      - name: Run unit tests
        run: node --test tests/*.js

      # Logical "build" step (static site = already buildable)
      - name: Prepare build output
        run: |
          rm -rf dist
          mkdir dist
          cp -r src/* dist/

      # Upload artifact for CD
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: dist/
          retention-days: 2