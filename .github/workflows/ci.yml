name: CI Pipeline

on:
  push:
    branches: [ "dev", "stage", "main" ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install tools ONLY inside CI (not in your repo)
      - name: Install lint and test tools
        run: |
          npm install -g eslint
          npm install -g eslint-plugin-import

      # LINT STATIC JS FILES
      - name: Lint JS
        run: |
          eslint src --ext .js || true

      # RUN TESTS (Node built-in test runner)
      - name: Run Unit Tests
        run: |
          node --test tests/

      # SECURITY: Scan only files (no deps = no vulnerabilities)
      - name: Security Scan
        run: |
          echo "No dependencies -> No vulnerabilities"

      # Upload static files as artifact
      - name: Upload static site
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: src/