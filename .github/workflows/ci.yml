name: CI Pipeline (Node.js & Python - Path Based)

on:
  push:
    branches: [ dev, stage, main ]
    paths:
      - node-app/**
      - python-app/**
      - .github/workflows/**
  pull_request:
    branches: [ dev, stage, main ]
    paths:
      - node-app/**
      - python-app/**
      - .github/workflows/**

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      node_changed: ${{ steps.detect.outputs.node_changed }}
      python_changed: ${{ steps.detect.outputs.python_changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          git diff --name-only "$BASE_SHA" "${{ github.sha }}" > files.txt || true

          NODE=false
          PYTHON=false

          if grep -q "^.github/workflows/" files.txt; then
            NODE=true
            PYTHON=true
          fi

          if grep -q "^node-app/" files.txt; then
            NODE=true
          fi

          if grep -q "^python-app/" files.txt; then
            PYTHON=true
          fi

          echo "node_changed=$NODE" >> $GITHUB_OUTPUT
          echo "python_changed=$PYTHON" >> $GITHUB_OUTPUT

  node-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.node_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: node-app
        run: npm install

      - name: Run lint
        working-directory: node-app
        run: npm run lint

      - name: Run unit tests
        working-directory: node-app
        run: npm test

  python-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: python-app
        run: pip install -r requirements.txt

      - name: Run lint
        working-directory: python-app
        run: flake8 .

      - name: Run unit tests
        working-directory: python-app
        run: python -m unittest