name: CI Pipeline (Node.js & Python - Path Based)

on:
  push:
    branches: [ main, develop ]
    paths:
      - node-app/**
      - python-app/**
  pull_request:
    branches: [ main, develop ]
    paths:
      - node-app/**
      - python-app/**

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest

    outputs:
      node_changed: ${{ steps.detect.outputs.node_changed }}
      python_changed: ${{ steps.detect.outputs.python_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        shell: bash
        run: |
          echo "Detecting changed files..."

          # Decide comparison base depending on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: ${{ github.sha }}"

          git diff --name-only "$BASE_SHA" "${{ github.sha }}" > files.txt || true
          echo "Changed files:"
          cat files.txt

          if grep -q "^node-app/" files.txt; then
            echo "node_changed=true" >> $GITHUB_OUTPUT
          else
            echo "node_changed=false" >> $GITHUB_OUTPUT
          fi

          if grep -q "^python-app/" files.txt; then
            echo "python_changed=true" >> $GITHUB_OUTPUT
          else
            echo "python_changed=false" >> $GITHUB_OUTPUT
          fi

  node-ci:
    name: Node.js CI
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.node_changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and run Node app
        working-directory: node-app
        run: |
          npm install
          npm test

  python-ci:
    name: Python CI
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.python_changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and run Python app
        working-directory: python-app
        run: |
          pip install -r requirements.txt
          python app.py