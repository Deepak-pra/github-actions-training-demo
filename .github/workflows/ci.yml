name: CI Pipeline

on:
  push:
    branches: [ "dev", "stage", "main" ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # LINT (uses ESLint via npx)
      - name: Run linting
        run: npx eslint src --ext .js

      # UNIT TESTS (Node built‑in test runner)
      - name: Run unit tests
        run: node --test tests/*.js

      # SECURITY SCAN (static-only project has no dependencies)
      - name: Security scan
        run: |
          echo "No dependencies present — repository is vulnerability‑free."

      # PREPARE BUILD (logical build step)
      - name: Prepare build output
        run: |
          mkdir dist
          cp -r src/* dist/

      # PACKAGE ARTIFACT FOR CD
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: dist/
          retention-days: 2