name: Day 6 Demo – Outputs & Artifacts (Correct)

on:
  workflow_dispatch:

jobs:
  ci:
    name: CI Job (Build & Produce Artifact)
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4

      # ---- STEP OUTPUT (CONTROL DATA) ----
      - name: Create step output
        id: meta
        run: |
          echo "artifact_name=python-build" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -------------------------------------------------
      # STEP: Install build tool (this may succeed or fail)
      # -------------------------------------------------
      - name: Install build tool
        id: install_tool
        run: pip install build

      # -------------------------------------------------
      # CONDITIONAL BUILD STEP
      # -------------------------------------------------
      - name: Build application
        if: ${{ steps.install_tool.outcome == 'success' }}
        working-directory: python-app
        run: python -m build

      # -------------------------------------------------
      # CONDITIONAL ARTIFACT UPLOAD
      # -------------------------------------------------
      - name: Upload artifact
        if: ${{ steps.install_tool.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: python-app/dist
          retention-days: 3

  cd:
    name: CD Job (Consume CI Artifact)
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.ci.outputs.artifact_name }}
          path: cd-input

      - name: Inspect artifact
        run: |
          echo "Artifact received by CD:"
          ls -R cd-input