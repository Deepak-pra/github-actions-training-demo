name: Artifacts_Outputs_Demo_CI

on:
  workflow_dispatch:

jobs:
  # -------------------------------------------------
  # JOB 1: PRODUCER – Creates outputs & artifacts
  # -------------------------------------------------
  producer:
    name: Producer Job (Build & Outputs)
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- STEP OUTPUT (CONTROL DATA) ----
      - name: Create step output
        id: meta
        run: |
          echo "artifact_name=python-build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Show step output inside job
        run: |
          echo "Artifact name is: ${{ steps.meta.outputs.artifact_name }}"

      # ---- BUILD OUTPUT (FILES) ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Build application (creates files)
        working-directory: python-app
        run: python -m build

      # ---- ARTIFACT CREATION ----
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: python-app/dist
          retention-days: 3


  # -------------------------------------------------
  # JOB 2: CONSUMER – Consumes artifact only
  # -------------------------------------------------
  consumer:
    name: Consumer Job (Artifact Usage – CI→CD Demo)
    runs-on: ubuntu-latest
    needs: producer

    steps:
      - name: Download artifact from previous job
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.producer.outputs.artifact_name }}
          path: consumed-artifact

      - name: Inspect downloaded artifact
        run: |
          echo "Artifact received from CI:"
          ls -R consumed-artifact
